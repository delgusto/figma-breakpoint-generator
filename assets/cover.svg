<svg width="1920" height="960" viewBox="0 0 1920 960" xmlns="http://www.w3.org/2000/svg">
  <!-- Figma Community cover art (1920×960). Export to PNG for the listing.
       Left: name + tagline. Right: a light + dark output preview. -->
  <defs>
    <style>
      .sans { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1920" height="960" fill="#FAFAF8"/>

  <!-- ── Left: type block ── -->
  <text class="sans" x="130" y="300" font-size="26" font-weight="600" letter-spacing="4" fill="#8A8A84">FIGMA PLUGIN</text>

  <text class="sans" x="126" y="420" font-size="104" font-weight="800" fill="#111111">Breakpoint</text>
  <text class="sans" x="126" y="536" font-size="104" font-weight="800" fill="#111111">Generator</text>
  <rect x="132" y="566" width="188" height="12" rx="6" fill="#FFCC00"/>

  <text class="sans" x="130" y="656" font-size="36" font-weight="400" fill="#4A4A46">One frame → every breakpoint.</text>
  <text class="sans" x="130" y="706" font-size="36" font-weight="400" fill="#4A4A46">Labelled, in light + dark, in one click.</text>

  <!-- feature pills -->
  <g class="sans" font-size="24" font-weight="500">
    <rect x="130" y="762" width="256" height="52" rx="26" fill="#111111"/>
    <text x="258" y="796" fill="#FFFFFF" text-anchor="middle">Variables &amp; modes</text>
    <rect x="402" y="762" width="150" height="52" rx="26" fill="#F0EFEA" stroke="#E2E1DB"/>
    <text x="477" y="796" fill="#333333" text-anchor="middle">Variants</text>
    <rect x="568" y="762" width="196" height="52" rx="26" fill="#F0EFEA" stroke="#E2E1DB"/>
    <text x="666" y="796" fill="#333333" text-anchor="middle">Light + dark</text>
  </g>

  <!-- ── Right: output preview card ── -->
  <rect x="1040" y="180" width="760" height="600" rx="28" fill="#FFFFFF" stroke="#EAE9E3" stroke-width="2"/>

  <!-- Light column -->
  <text class="sans" x="1092" y="262" font-size="24" font-weight="600" fill="#111111">Light</text>
  <g>
    <rect x="1092" y="286" width="120" height="66" rx="10" fill="#ECECE8"/>
    <rect x="1092" y="372" width="184" height="66" rx="10" fill="#ECECE8"/>
    <rect x="1092" y="458" width="256" height="66" rx="10" fill="#ECECE8"/>
    <rect x="1092" y="544" width="300" height="66" rx="10" fill="#ECECE8"/>
    <rect x="1092" y="286" width="40" height="8" rx="4" fill="#FFCC00"/>
  </g>

  <!-- Dark column -->
  <text class="sans" x="1470" y="262" font-size="24" font-weight="600" fill="#111111">Dark</text>
  <g>
    <rect x="1470" y="286" width="120" height="66" rx="10" fill="#1C1C1C"/>
    <rect x="1470" y="372" width="184" height="66" rx="10" fill="#1C1C1C"/>
    <rect x="1470" y="458" width="256" height="66" rx="10" fill="#1C1C1C"/>
    <rect x="1470" y="544" width="300" height="66" rx="10" fill="#1C1C1C"/>
    <rect x="1470" y="286" width="40" height="8" rx="4" fill="#FFCC00"/>
  </g>
</svg>
